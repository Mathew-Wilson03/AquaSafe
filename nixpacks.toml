[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.mysqli",
  "php82Extensions.mbstring",
  "php82Extensions.openssl",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.opcache",
  "php82Packages.composer"
]

[phases.install]
cmds = ["if [ -d Login ]; then cd Login && composer install --no-dev --optimize-autoloader --no-interaction; fi"]

# Let Nixpacks use its default web server (Apache/Nginx) for PHP apps 
# which inherently supports multithreading and production workloads,
# rather than forcing the fragile single-threaded `php -S` development server.
