[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.mysqli",
  "php82Extensions.mbstring",
  "php82Extensions.openssl",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "apacheHttpd",
  "composer"
]

[phases.install]
cmds = ["cd Login && composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "httpd -D FOREGROUND -f /etc/httpd/httpd.conf"
